<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
 --primary:#ff5c8a;
 --bg:#fff5f7;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
 font-family:'Prompt',sans-serif;
 background:linear-gradient(180deg,#fff5f7,#ffeef2);
 overflow-x:hidden;
 color:#444;
}

/* PREMIUM LETTER SCREEN */
#letterOverlay{
 position:fixed;
 inset:0;
 z-index:99999;
 display:flex;
 justify-content:center;
 align-items:center;
 background:
 radial-gradient(circle at top,#fff,#ffe6ee 60%,#ffd9e7);
 transition:1.5s;
}

#letterOverlay.hide{
 opacity:0;
 visibility:hidden;
}

.sparkle{
 position:absolute;
 font-size:22px;
 animation:float 5s linear infinite;
 opacity:.7;
}

.envelope-wrap{
 perspective:1200px;
}

.envelope{
 position:relative;
 width:340px;
 height:220px;
 cursor:pointer;
}

.envelope-back{
 position:absolute;
 inset:0;
 background:#fff;
 border-radius:0 0 20px 20px;
 box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.envelope-flap{
 position:absolute;
 width:100%;
 height:120px;
 background:#ffd0dd;
 transform-origin:top;
 clip-path:polygon(0 0,100% 0,50% 100%);
 transition:1s;
 z-index:3;
}

.letter{
 position:absolute;
 left:20px;
 right:20px;
 top:20px;
 height:180px;
 background:white;
 border-radius:15px;
 padding:20px;
 text-align:center;
 transition:1s;
 z-index:2;
}

.open .envelope-flap{
 transform:rotateX(180deg);
}

.open .letter{
 transform:translateY(-170px);
}

.letter h2{
 color:var(--primary);
 margin-bottom:10px;
}

.enter-btn{
 margin-top:12px;
 border:none;
 background:var(--primary);
 color:white;
 padding:10px 20px;
 border-radius:999px;
 cursor:pointer;
}

/* Main Site */
.hero{
 min-height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 text-align:center;
 padding:30px;
}

.hero-card{
 background:white;
 padding:50px 30px;
 border-radius:30px;
 max-width:700px;
 box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.main-photo{
 width:220px;
 height:220px;
 object-fit:cover;
 border-radius:25px;
 margin:25px auto;
}

h1,h2{color:var(--primary)}

.btn{
 display:inline-block;
 padding:14px 28px;
 border-radius:999px;
 background:var(--primary);
 color:white;
 text-decoration:none;
 margin-top:15px;
}

.gallery{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;
 max-width:1100px;
 margin:50px auto;
 padding:20px;
}

.gallery img{
 width:100%;
 height:320px;
 object-fit:cover;
 border-radius:20px;
}

.message{
 max-width:900px;
 margin:50px auto;
 background:white;
 padding:40px;
 border-radius:30px;
 text-align:center;
}

#musicBtn{
 position:fixed;
 top:20px;
 right:20px;
 z-index:999;
 border:none;
 border-radius:999px;
 padding:12px 20px;
 background:var(--primary);
 color:white;
}

@keyframes float{
 from{transform:translateY(100vh)}
 to{transform:translateY(-100vh)}
}
</style>
</head>
<body>

<div id="letterOverlay">
  <div class="sparkle" style="left:10%">✨</div>
  <div class="sparkle" style="left:30%;animation-delay:1s">💖</div>
  <div class="sparkle" style="left:60%;animation-delay:2s">✨</div>
  <div class="sparkle" style="left:80%;animation-delay:3s">💖</div>

  <div class="envelope-wrap">
    <div class="envelope" id="envelope">
      <div class="envelope-flap"></div>
      <div class="envelope-back"></div>

      <div class="letter">
        <h2>ถึงลูกแก้ว 💌</h2>
        <p>สุขสันต์วันเกิดนะคนเก่ง</p>
        <button class="enter-btn">เปิดจดหมาย</button>
      </div>
    </div>
  </div>
</div>

<button id="musicBtn">▶ เพลง</button>

<section class="hero">
 <div class="hero-card">
  <h1>Happy Birthday ❤️</h1>
  <img src="photo1.jpg" class="main-photo">
  <p>ขอบคุณที่อยู่ด้วยกันเสมอ</p>
  <a href="#gallery" class="btn">ดูความทรงจำของเรา</a>
 </div>
</section>

<section id="gallery" class="gallery">
 <img src="photo1.jpg">
 <img src="photo2.jpg">
 <img src="photo3.jpg">
 <img src="photo4.jpg">
 <img src="photo5.jpg">
 <img src="photo6.jpg">
</section>

<div class="message">
 <h2>ถึงลูกแก้ว 💌</h2>
 <p>ขอให้ปีนี้เป็นปีที่มีความสุขมาก ๆ และได้ยิ้มในทุกวันนะ ❤️</p>
</div>

<audio id="music" loop>
 <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const overlay=document.getElementById('letterOverlay');
const envelope=document.getElementById('envelope');

document.querySelector('.enter-btn').addEventListener('click',()=>{
 envelope.classList.add('open');

 setTimeout(()=>{
   overlay.classList.add('hide');
 },1800);
});

const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

btn.addEventListener('click',()=>{
 if(music.paused){
   music.play();
   btn.textContent='⏸ หยุดเพลง';
 }else{
   music.pause();
   btn.textContent='▶ เพลง';
 }
});
</script>

</body>
</html>
